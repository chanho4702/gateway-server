server:
  port: 8000
spring:
  application:
    name: gateway-server
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 3000 # ms — 다운스트림 연결 3초
            response-timeout: 10s # 응답 전체 10초 (무한대기 방지)
          globalcors:
            cors-configurations:
              '[/**]':
                # allowCredentials(쿠키)와 함께 쓰므로 오리진은 반드시 구체 값 유지 — '*' 금지.
                allowedOrigins: "${CORS_ALLOWED_ORIGIN:http://localhost:5173}"
                allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600 # preflight 캐시(초) — OPTIONS 왕복 절감
          routes:
            # board-service — 게시판/댓글. No StripPrefix(경로 그대로 전달).
            - id: board
              uri: ${BOARD_SERVICE_URI:http://localhost:9100}
              predicates:
                - Path=/api/board/**
            # auth-server — OIDC 로그인 리다이렉트 흐름 (IP당 10 req/s, burst 20)
            - id: auth-oauth2
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/oauth2/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"
            - id: auth-login
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/login/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"
            # auth-server — refresh/logout (브루트포스 방어: IP당 5 req/s, burst 10)
            - id: auth-api
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@ipKeyResolver}"
            # auth-server — JWKS 공개키
            - id: auth-jwks
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/.well-known/**
            # auth-server — 자체 JWT 검증 사용자정보
            - id: auth-me
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/api/me

server:
  port: 8000
spring:
  application:
    name: gateway-server
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 3000 # ms — 다운스트림 연결 3초
            response-timeout: 10s # 응답 전체 10초 (무한대기 방지)
          # CORS는 SecurityConfig의 CorsConfigurationSource 빈이 단일 소스
          # (Security 401 응답에도 CORS 헤더가 붙어야 프론트 refresh 흐름이 살기 때문).
          routes:
            # board-service — 게시판/댓글. No StripPrefix(경로 그대로 전달).
            # CB(바깥) + GET 한정 Retry(안쪽) — 불능 시 /fallback/board 503.
            - id: board
              uri: ${BOARD_SERVICE_URI:lb://board-service}
              predicates:
                - Path=/api/board/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: board
                    fallbackUri: forward:/fallback/board
                - name: Retry
                  args:
                    retries: 2
                    methods: GET # 멱등 GET만 — POST 재시도는 중복 생성 사고
                    series: SERVER_ERROR
                    # 연결 실패만 재시도 — 기본값(IOException+TimeoutException)이면
                    # 타임아웃까지 재시도해 fallback 지연이 3배로 증폭된다.
                    exceptions: java.io.IOException
            # auth-server — OIDC 로그인 리다이렉트 흐름 (IP당 10 req/s, burst 20)
            - id: auth-oauth2
              uri: ${AUTH_SERVER_URI:lb://auth-server}
              predicates:
                - Path=/oauth2/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"
            - id: auth-login
              uri: ${AUTH_SERVER_URI:lb://auth-server}
              predicates:
                - Path=/login/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"
            # auth-server — refresh/logout (브루트포스 방어: IP당 5 req/s, burst 10)
            - id: auth-api
              uri: ${AUTH_SERVER_URI:lb://auth-server}
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@ipKeyResolver}"
            # auth-server — JWKS 공개키
            - id: auth-jwks
              uri: ${AUTH_SERVER_URI:lb://auth-server}
              predicates:
                - Path=/.well-known/**
            # auth-server — 자체 JWT 검증 사용자정보.
            # rate limiter 없음(의도): 무토큰/위조는 Security가 401로 조기 차단하고
            # 유효 토큰 소지자만 도달하므로 인증 경로 3개와 달리 브루트포스 표면이 아님.
            - id: auth-me
              uri: ${AUTH_SERVER_URI:lb://auth-server}
              predicates:
                - Path=/api/me

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    # Windows/사설망에서 DESKTOP-xxx.mshome.net 같은 DNS 해석 불가 호스트명으로 등록되면
    # lb:// 해석이 UnknownHostException으로 죽는다 — IP로 등록 (E2E에서 실측).
    prefer-ip-address: true

resilience4j:
  timelimiter:
    instances:
      board:
        # CircuitBreaker의 총 예산 캡. 미설정 시 Resilience4j 기본 1s가 적용되어
        # 1초 넘는 정상 응답까지 fallback 503으로 잘린다(httpclient response-timeout 10s보다 크게).
        timeout-duration: 11s

platform:
  # auth-server 발급 자체 AT의 검증 계약 — auth/board와 동일 env 이름.
  jwks-uri: ${AUTH_JWKS_URI:http://localhost:9000/.well-known/jwks.json}
  issuer: ${PLATFORM_ISSUER:http://localhost:9000}
  audience: ${PLATFORM_AUDIENCE:platform-api}
  cors-allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}

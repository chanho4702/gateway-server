server:
  port: 8000
spring:
  application:
    name: gateway-server
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 3000 # ms — 다운스트림 연결 3초
            response-timeout: 10s # 응답 전체 10초 (무한대기 방지)
          # CORS는 SecurityConfig의 CorsConfigurationSource 빈이 단일 소스
          # (Security 401 응답에도 CORS 헤더가 붙어야 프론트 refresh 흐름이 살기 때문).
          routes:
            # board-service — 게시판/댓글. No StripPrefix(경로 그대로 전달).
            # CB(바깥) + GET 한정 Retry(안쪽) — 불능 시 /fallback/board 503.
            - id: board
              uri: ${BOARD_SERVICE_URI:http://localhost:9100}
              predicates:
                - Path=/api/board/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: board
                    fallbackUri: forward:/fallback/board
                - name: Retry
                  args:
                    retries: 2
                    methods: GET # 멱등 GET만 — POST 재시도는 중복 생성 사고
                    series: SERVER_ERROR
            # auth-server — OIDC 로그인 리다이렉트 흐름 (IP당 10 req/s, burst 20)
            - id: auth-oauth2
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/oauth2/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"
            - id: auth-login
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/login/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"
            # auth-server — refresh/logout (브루트포스 방어: IP당 5 req/s, burst 10)
            - id: auth-api
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@ipKeyResolver}"
            # auth-server — JWKS 공개키
            - id: auth-jwks
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/.well-known/**
            # auth-server — 자체 JWT 검증 사용자정보
            - id: auth-me
              uri: ${AUTH_SERVER_URI:http://localhost:9000}
              predicates:
                - Path=/api/me

platform:
  # auth-server 발급 자체 AT의 검증 계약 — auth/board와 동일 env 이름.
  jwks-uri: ${AUTH_JWKS_URI:http://localhost:9000/.well-known/jwks.json}
  issuer: ${PLATFORM_ISSUER:http://localhost:9000}
  audience: ${PLATFORM_AUDIENCE:platform-api}
  cors-allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}

name: CI
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
      - uses: gradle/actions/setup-gradle@v4   # gradle 캐시
      - run: chmod +x gradlew                  # Windows에서 커밋된 실행비트 보정
      - run: ./gradlew test bootJar --no-daemon

      - name: Login GHCR
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/chanho4702/gateway-server:latest
            ghcr.io/chanho4702/gateway-server:sha-${{ github.sha }}

      - name: Dispatch deploy
        if: github.ref == 'refs/heads/master'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_PAT }}
          repository: chanho4702/infra-settings
          event-type: deploy
          client-payload: '{"service":"gateway-server","sha":"${{ github.sha }}","run_id":"${{ github.run_id }}","repo":"${{ github.repository }}"}'
